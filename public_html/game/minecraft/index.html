<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebCraft - Online Minecraft Clone</title>
    <meta name="description" content="Browser-based Minecraft clone with real-time multiplayer">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">
</head>

<body>
    <!-- Loading Screen -->
    <div id="loading-screen">
        <div class="loading-content">
            <h1>⛏️ WebCraft</h1>
            <div class="loading-bar">
                <div class="loading-progress"></div>
            </div>
            <p id="loading-text">Loading world...</p>
        </div>
    </div>

    <!-- Menu Screen -->
    <div id="menu-screen" style="display: none;">
        <div class="menu-content">
            <h1>⛏️ WebCraft</h1>
            <div class="menu-box">
                <input type="text" id="player-name" placeholder="プレイヤー名を入力" maxlength="16">
                <button id="play-btn" class="menu-btn primary">🎮 サバイバルモード</button>
                <div class="server-status">
                    <span id="online-count">0</span> players online
                </div>
            </div>
            <div class="controls-info">
                <h3>操作方法</h3>
                <ul>
                    <li><kbd>W</kbd><kbd>A</kbd><kbd>S</kbd><kbd>D</kbd> - 移動</li>
                    <li><kbd>Space</kbd> - ジャンプ</li>
                    <li><kbd>Shift</kbd> - スニーク</li>
                    <li><kbd>左クリック</kbd> - ブロック破壊</li>
                    <li><kbd>右クリック</kbd> - ブロック設置</li>
                    <li><kbd>1-9</kbd> - アイテム選択</li>
                    <li><kbd>E</kbd> - インベントリ</li>
                    <li><kbd>Esc</kbd> - メニュー</li>
                </ul>
            </div>
        </div>
    </div>

    <!-- Game Canvas -->
    <canvas id="game-canvas"></canvas>

    <!-- HUD -->
    <div id="hud" style="display: none;">
        <!-- Crosshair -->
        <div id="crosshair">+</div>

        <!-- Health & Hunger -->
        <div id="status-bars">
            <div class="status-bar">
                <span class="status-icon">❤️</span>
                <div class="bar-container">
                    <div id="health-bar" class="bar health"></div>
                </div>
                <span id="health-text">20/20</span>
            </div>
            <div class="status-bar">
                <span class="status-icon">🍖</span>
                <div class="bar-container">
                    <div id="hunger-bar" class="bar hunger"></div>
                </div>
                <span id="hunger-text">20/20</span>
            </div>
        </div>

        <!-- Hotbar -->
        <div id="hotbar">
            <div class="hotbar-slot selected" data-slot="0">
                <div class="block-icon grass"></div>
            </div>
            <div class="hotbar-slot" data-slot="1">
                <div class="block-icon dirt"></div>
            </div>
            <div class="hotbar-slot" data-slot="2">
                <div class="block-icon stone"></div>
            </div>
            <div class="hotbar-slot" data-slot="3">
                <div class="block-icon wood"></div>
            </div>
            <div class="hotbar-slot" data-slot="4">
                <div class="block-icon leaves"></div>
            </div>
            <div class="hotbar-slot" data-slot="5">
                <div class="block-icon sand"></div>
            </div>
            <div class="hotbar-slot" data-slot="6">
                <div class="block-icon cobblestone"></div>
            </div>
            <div class="hotbar-slot" data-slot="7">
                <div class="block-icon planks"></div>
            </div>
            <div class="hotbar-slot" data-slot="8">
                <div class="block-icon brick"></div>
            </div>
        </div>

        <!-- Player List -->
        <div id="player-list">
            <h4>🌐 オンライン</h4>
            <ul id="players"></ul>
        </div>

        <!-- Coordinates -->
        <div id="coordinates">
            <span>X: <span id="coord-x">0</span></span>
            <span>Y: <span id="coord-y">0</span></span>
            <span>Z: <span id="coord-z">0</span></span>
            <span>FPS: <span id="fps">0</span></span>
        </div>

        <!-- Chat -->
        <div id="chat">
            <div id="chat-messages"></div>
            <input type="text" id="chat-input" placeholder="メッセージを入力... (Enter)" style="display: none;">
        </div>
    </div>

    <!-- Pause Menu -->
    <div id="pause-menu" style="display: none;">
        <div class="pause-content">
            <h2>⏸️ 一時停止</h2>
            <button id="resume-btn" class="menu-btn">▶️ ゲームに戻る</button>
            <button id="quit-btn" class="menu-btn danger">🚪 ゲーム終了</button>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/simplex-noise@2.4.0/simplex-noise.min.js"></script>
    <script src="network.js"></script>
    <script src="game.js"></script>
</body>

</html>
