<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="可愛い写真が撮れるプリクラ風フォトエディター">
    <title>✨ Kawaii Photo Studio ✨</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;700;900&family=Poppins:wght@400;600;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="app-container">
        <header class="app-header">
            <h1 class="app-title">✨ Kawaii Photo Studio ✨</h1>
            <p class="app-subtitle">プリクラ風フォトエディター</p>
        </header>

        <main class="main-content">
            <!-- Upload/Camera Section -->
            <section class="upload-section" id="upload-section">
                <div class="upload-box">
                    <div class="upload-icon">📸</div>
                    <h2>写真をアップロード</h2>
                    <p>または</p>
                    <div class="button-group">
                        <label for="file-input" class="btn btn-primary">
                            📁 ファイルを選択
                        </label>
                        <button id="camera-btn" class="btn btn-secondary">
                            📷 カメラで撮影
                        </button>
                    </div>
                    <input type="file" id="file-input" accept="image/*" hidden>
                </div>
            </section>

            <!-- Editor Section -->
            <section class="editor-section hidden" id="editor-section">
                <div class="editor-container">
                    <!-- Canvas Area -->
                    <div class="canvas-area">
                        <div class="canvas-wrapper" id="canvas-wrapper">
                            <canvas id="main-canvas"></canvas>
                            <div id="sticker-container"></div>
                            <div id="text-container"></div>
                        </div>
                    </div>

                    <!-- Tools Panel -->
                    <aside class="tools-panel">
                        <div class="tool-category">
                            <h3>🎨 フィルター</h3>
                            <div class="filter-grid">
                                <button class="filter-btn active" data-filter="none">
                                    <span>オリジナル</span>
                                </button>
                                <button class="filter-btn" data-filter="kawaii">
                                    <span>かわいい</span>
                                </button>
                                <button class="filter-btn" data-filter="pastel">
                                    <span>パステル</span>
                                </button>
                                <button class="filter-btn" data-filter="sweet">
                                    <span>スウィート</span>
                                </button>
                                <button class="filter-btn" data-filter="vintage">
                                    <span>ビンテージ</span>
                                </button>
                                <button class="filter-btn" data-filter="dreamy">
                                    <span>ドリーミー</span>
                                </button>
                            </div>
                        </div>

                        <div class="tool-category">
                            <h3>💖 ステッカー</h3>
                            <div class="sticker-grid">
                                <button class="sticker-btn" data-sticker="💖">💖</button>
                                <button class="sticker-btn" data-sticker="✨">✨</button>
                                <button class="sticker-btn" data-sticker="🌟">🌟</button>
                                <button class="sticker-btn" data-sticker="⭐">⭐</button>
                                <button class="sticker-btn" data-sticker="💫">💫</button>
                                <button class="sticker-btn" data-sticker="🌸">🌸</button>
                                <button class="sticker-btn" data-sticker="🌺">🌺</button>
                                <button class="sticker-btn" data-sticker="🌼">🌼</button>
                                <button class="sticker-btn" data-sticker="🦋">🦋</button>
                                <button class="sticker-btn" data-sticker="🎀">🎀</button>
                                <button class="sticker-btn" data-sticker="👑">👑</button>
                                <button class="sticker-btn" data-sticker="💝">💝</button>
                                <button class="sticker-btn" data-sticker="🎈">🎈</button>
                                <button class="sticker-btn" data-sticker="🎉">🎉</button>
                                <button class="sticker-btn" data-sticker="🍓">🍓</button>
                                <button class="sticker-btn" data-sticker="🍰">🍰</button>
                            </div>
                        </div>

                        <div class="tool-category">
                            <h3>📝 テキスト</h3>
                            <input type="text" id="text-input" placeholder="テキストを入力..." class="text-input">
                            <div class="color-picker-group">
                                <label>カラー:</label>
                                <div class="color-options">
                                    <button class="color-btn" data-color="#FF69B4"
                                        style="background: #FF69B4;"></button>
                                    <button class="color-btn" data-color="#FFB6C1"
                                        style="background: #FFB6C1;"></button>
                                    <button class="color-btn" data-color="#FF1493"
                                        style="background: #FF1493;"></button>
                                    <button class="color-btn" data-color="#FF69F0"
                                        style="background: #FF69F0;"></button>
                                    <button class="color-btn" data-color="#00CED1"
                                        style="background: #00CED1;"></button>
                                    <button class="color-btn" data-color="#FFD700"
                                        style="background: #FFD700;"></button>
                                    <button class="color-btn active" data-color="#FFFFFF"
                                        style="background: #FFFFFF; border: 2px solid #FF69B4;"></button>
                                    <button class="color-btn" data-color="#000000"
                                        style="background: #000000;"></button>
                                </div>
                            </div>
                            <button id="add-text-btn" class="btn btn-accent">✏️ テキスト追加</button>
                        </div>

                        <div class="tool-category">
                            <h3>🖼️ フレーム</h3>
                            <div class="frame-grid">
                                <button class="frame-btn active" data-frame="none">
                                    <span>なし</span>
                                </button>
                                <button class="frame-btn" data-frame="hearts">
                                    <span>💕</span>
                                </button>
                                <button class="frame-btn" data-frame="stars">
                                    <span>⭐</span>
                                </button>
                                <button class="frame-btn" data-frame="flowers">
                                    <span>🌸</span>
                                </button>
                            </div>
                        </div>

                        <div class="tool-category">
                            <h3>💎 明るさ</h3>
                            <input type="range" id="brightness-slider" min="50" max="150" value="100" class="slider">
                            <span id="brightness-value">100%</span>
                        </div>

                        <div class="action-buttons">
                            <button id="download-btn" class="btn btn-success">💾 保存</button>
                            <button id="reset-btn" class="btn btn-danger">🔄 リセット</button>
                            <button id="new-photo-btn" class="btn btn-secondary">📸 新しい写真</button>
                        </div>
                    </aside>
                </div>
            </section>
        </main>

        <!-- Camera Modal -->
        <div id="camera-modal" class="modal hidden">
            <div class="modal-content">
                <span class="close-modal" id="close-camera">&times;</span>
                <h2>📷 カメラ撮影</h2>
                <video id="camera-video" autoplay playsinline></video>
                <canvas id="camera-canvas" hidden></canvas>
                <div class="camera-controls">
                    <button id="capture-btn" class="btn btn-primary">📸 撮影</button>
                    <button id="cancel-camera-btn" class="btn btn-secondary">キャンセル</button>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
