<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF Compressor | Premium Tool</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Main CSS -->
    <link rel="stylesheet" href="style.css">
    <!-- Libraries -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>

<body>
    <div class="background-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>

    <div class="app-container">
        <header>
            <div class="logo">
                <i class="fa-solid fa-file-pdf"></i>
                <span>PDF Compressor</span>
            </div>
            <p>Secure, client-side compression. Your files never leave your device.</p>
        </header>

        <main>
            <!-- Upload Section -->
            <section id="upload-section" class="card active">
                <div class="drop-zone" id="drop-zone">
                    <div class="icon-wrapper">
                        <i class="fa-solid fa-cloud-arrow-up"></i>
                    </div>
                    <h3>Drag & Drop PDF Here</h3>
                    <p>or</p>
                    <button class="btn btn-primary" id="select-file-btn">Select File</button>
                    <input type="file" id="file-input" accept=".pdf" hidden>
                </div>
            </section>

            <!-- Settings & Preview Section -->
            <section id="settings-section" class="card hidden">
                <div class="file-info-bar">
                    <div class="file-details">
                        <i class="fa-regular fa-file-lines"></i>
                        <span id="file-name">document.pdf</span>
                        <span id="file-size" class="badge">2.5 MB</span>
                    </div>
                    <button class="btn-icon" id="remove-file-btn" title="Remove File"><i
                            class="fa-solid fa-xmark"></i></button>
                </div>

                <div class="settings-grid">
                    <div class="setting-item">
                        <label>Compression Level</label>
                        <div class="range-wrapper">
                            <input type="range" id="quality-slider" min="0.1" max="1.0" step="0.1" value="0.6">
                            <span id="quality-value">60%</span>
                        </div>
                        <p class="help-text">Lower quality = Smaller file size</p>
                    </div>

                    <div class="setting-item">
                        <label>Resolution Scale</label>
                        <div class="select-wrapper">
                            <select id="scale-select">
                                <option value="0.5">0.5x (Smallest)</option>
                                <option value="0.75" selected>0.75x (Balanced)</option>
                                <option value="1.0">1.0x (Original)</option>
                                <option value="1.5">1.5x (High Readability)</option>
                            </select>
                        </div>
                    </div>

                    <div class="setting-item">
                        <label>Color Mode</label>
                        <div class="toggle-group">
                            <input type="radio" name="color-mode" id="mode-color" value="color" checked>
                            <label for="mode-color" class="toggle-btn">Color</label>

                            <input type="radio" name="color-mode" id="mode-gray" value="grayscale">
                            <label for="mode-gray" class="toggle-btn">Grayscale</label>
                        </div>
                    </div>
                </div>

                <div class="action-area">
                    <button class="btn btn-large btn-gradient" id="compress-btn">
                        <i class="fa-solid fa-compress"></i> Compress PDF
                    </button>
                </div>
            </section>

            <!-- Progress Section -->
            <section id="progress-section" class="card hidden">
                <h3>Compressing...</h3>
                <div class="progress-container">
                    <div class="progress-bar-bg">
                        <div class="progress-bar-fill" id="progress-fill"></div>
                    </div>
                    <span id="progress-text">Page 1 of 5</span>
                </div>
                <!-- Log area to show user what's happening (premium detail) -->
                <div class="process-log" id="process-log">Initializing...</div>
            </section>

            <!-- Result Section -->
            <section id="result-section" class="card hidden">
                <div class="success-icon">
                    <i class="fa-solid fa-check"></i>
                </div>
                <h2>Compression Complete!</h2>

                <div class="stats-comparison">
                    <div class="stat-box">
                        <span class="label">Original</span>
                        <span class="value" id="original-size">2.5 MB</span>
                    </div>
                    <div class="arrow">
                        <i class="fa-solid fa-arrow-right"></i>
                    </div>
                    <div class="stat-box highlight">
                        <span class="label">Compressed</span>
                        <span class="value" id="compressed-size">1.2 MB</span>
                    </div>
                </div>

                <div class="reduction-badge" id="reduction-badge">-52%</div>

                <div class="action-buttons">
                    <button class="btn btn-primary btn-large" id="download-btn">
                        <i class="fa-solid fa-download"></i> Download PDF
                    </button>
                    <button class="btn btn-secondary" id="reset-btn">Compress Another</button>
                </div>
            </section>
        </main>
    </div>

    <!-- Toast Notification Container -->
    <div id="toast-container"></div>

    <script src="app.js"></script>
</body>

</html>
