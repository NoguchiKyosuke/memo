<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>前置詞穴埋め問題アプリ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f0f4f8;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            box-sizing: border-box;
        }
        .container {
            background-color: #ffffff;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            padding: 30px;
            width: 100%;
            max-width: 800px; /* 少し幅を広げて列表示に対応 */
            text-align: center;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        .question-box {
            background-color: #e0f2fe;
            border-radius: 10px;
            padding: 25px;
            font-size: 1.25rem;
            font-weight: 500;
            color: #1e3a8a;
            min-height: 120px;
            display: flex;
            flex-direction: column; /* デフォルトは縦積み */
            justify-content: center;
            align-items: center;
            gap: 15px; /* 列間のギャップ */
            word-break: break-word;
        }

        /* 画面が中程度以上のサイズで横並びにする */
        @media (min-width: 768px) { /* md breakpoint */
            .question-box {
                flex-direction: row; /* 横並び */
                text-align: left; /* テキストを左寄せ */
                align-items: flex-start; /* 上端揃え */
            }
            .question-box > div {
                flex: 1; /* 各列が均等な幅を占める */
            }
        }

        .english-sentence, .japanese-sentence {
            padding: 5px;
        }
        .english-sentence {
            font-size: 1.25rem;
            color: #1e3a8a;
        }
        .japanese-sentence {
            font-size: 1rem;
            color: #4a5568;
        }

        .input-group {
            display: flex;
            justify-content: center;
            gap: 10px;
        }
        .input-group input[type="text"] {
            border: 2px solid #90cdf4;
            border-radius: 8px;
            padding: 12px 18px;
            font-size: 1.1rem;
            width: 70%;
            max-width: 250px;
            outline: none;
            transition: border-color 0.3s ease;
        }
        .input-group input[type="text"]:focus {
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.2);
        }
        .input-group button {
            background-color: #3b82f6;
            color: white;
            border: none;
            border-radius: 8px;
            padding: 12px 25px;
            font-size: 1.1rem;
            cursor: pointer;
            transition: background-color 0.3s ease, transform 0.2s ease;
        }
        .input-group button:hover {
            background-color: #2563eb;
            transform: translateY(-2px);
        }
        .input-group button:active {
            transform: translateY(0);
        }
        .message {
            font-size: 1rem;
            font-weight: 600;
            margin-top: 10px;
            min-height: 24px; /* メッセージの高さ確保 */
        }
        .message.correct {
            color: #10b981; /* 緑 */
        }
        .message.incorrect {
            color: #ef4444; /* 赤 */
        }
        .progress-bar {
            background-color: #e2e8f0;
            border-radius: 5px;
            height: 10px;
            margin-top: 15px;
            overflow: hidden;
        }
        .progress-fill {
            background-color: #3b82f6;
            height: 100%;
            width: 0%;
            border-radius: 5px;
            transition: width 0.5s ease-in-out;
        }
        .counter {
            font-size: 0.9rem;
            color: #4a5568;
            text-align: right;
            margin-top: 5px;
        }
        @media (max-width: 480px) {
            .input-group {
                flex-direction: column;
                gap: 15px;
            }
            .input-group input[type="text"],
            .input-group button {
                width: 100%;
                max-width: none;
            }
        }
    </style>
</head>
<body>
    <div class="container">

        <div class="question-box" id="questionBox">
            <!-- 問題がここに表示されます -->
            <div class="english-sentence" id="englishSentence"></div>
            <div class="japanese-sentence" id="japaneseSentence"></div>
        </div>
        <div class="input-group">
            <input type="text" id="answerInput" placeholder="前置詞を入力してください" autofocus>
            <button id="checkButton">チェック</button>
        </div>
        <div class="message" id="message"></div>
        <button id="nextButton" class="bg-gray-400 text-white rounded-lg py-3 px-6 text-lg cursor-not-allowed" disabled>次の問題</button>
        <div class="progress-bar">
            <div class="progress-fill" id="progressBarFill"></div>
        </div>
        <div class="counter" id="questionCounter"></div>
    </div>

            { example: "I found a wallet ___ cash on the street.", answer: "sans", japanese: "私は道で中身のない財布を見つけた。" },
            { example: "They are all alive ___ her.", answer: "save", japanese: "彼らは彼女を除いて全員生きている。" },
            { example: "It was written by Bob, ___ Joe who was ill.", answer: "vice", japanese: "それは病気のジョーに代わってボブによって書かれた。" },
            { example: "___ the news, the boy was found safe.", answer: "according to", japanese: "ニュースによると、その少年は無事に見つかったという。" },
            { example: "A hill loomed ___ them.", answer: "ahead of", japanese: "彼らの前に丘がぼんやりと見えてきた。" },
            { example: "___ magazines, Tom reads very little.", answer: "apart from", japanese: "トムは雑誌以外はほとんど読まない。" },
            { example: "___ me, I don't like that actor.", answer: "as for", japanese: "私どうかと言うと、あの俳優は好みではない。" },
            { example: "I don't smoke ___ now.", answer: "as of", japanese: "今のところタバコは吸っていない。" },
            { example: "___ usual, she showed up late.", answer: "as per", japanese: "いつもどおり、彼女は遅れてやって来た。" },
            { example: "___ the problem, a quick measure is required.", answer: "as regards", japanese: "その問題については、急ぎの対応が求められている。" },
            { example: "___ a few scratches, I'm OK.", answer: "aside from", japanese: "少し擦り傷がある以外は大丈夫だ。" },
            { example: "Mary was late ___ the heavy traffic.", answer: "because of", japanese: "メアリーはひどい渋滞のために遅刻した。" },
            { example: "Our new house is ___ the school.", answer: "close to", japanese: "私たちの新居は学校の近くにある。" },
            { example: "I have had to reduce my workload ___ the pain.", answer: "due to", japanese: "私はその痛みのために仕事量を減らさざるを得なかった。" },
            { example: "No one came ___ Catharine.", answer: "except for", japanese: "キャサリンを除いては誰も来なかった。" },
            { example: "That is quite ___ the truth.", answer: "far from", japanese: "それは事実とかけ離れている。" },
            { example: "I have a bruise ___ my wrist.", answer: "inside of", japanese: "私は手首の内側に傷がある。" },
            { example: "He walked to school ___ taking the car.", answer: "instead of", japanese: "彼は車に乗らずに歩いて学校まで行った。" },
            { example: "The old man lives ___ me.", answer: "next to", japanese: "その老人は私の隣に住んでいる。" },
            { example: "Now. ___ the next topic.", answer: "on to", japanese: "さて。次の話題に移ります。" },
            { example: "The audience came ___ the theater.", answer: "out of", japanese: "観客がその劇場から外に出てきた。" },
            { example: "I was ___ the building when he came back.", answer: "outside of", japanese: "彼が帰ってきた時、私はその建物の外にいた。" },
            { example: "He'll leave here ___ unavoidable circumstances.", answer: "owing to", japanese: "彼はやむを得ない事情でここを去る予定だ。" },
            { example: "She went to Canada ___ her trip to America.", answer: "prior to", japanese: "彼女はアメリカに旅行する前にカナダへ行った。" },
            { example: "___ the contract, you have to pay for it.", answer: "pursuant to", japanese: "契約に準じ、あなたはその代金を支払わなくてはならない。" },
            { example: "I'll buy it, ___ the cost.", answer: "regardless of", japanese: "値段に関係なく、私はそれを買うつもりだ。" },
            { example: "He worked hard ___ the meeting.", answer: "subsequent to", japanese: "その会議の後、彼は一生懸命に働いた。" },
            { example: "I can go to college ___ my aunt's help.", answer: "thanks to", japanese: "私はおばの援助のおかげで大学に通うことができる。" },
            { example: "I walked ___ Kyoto Station.", answer: "as far as", japanese: "私は京都駅まで歩いた。" },
            { example: "___ clothes, he gave me some food.", answer: "as well as", japanese: "衣類に加え、彼は私に食べ物をくれた。" },
            { example: "I went there ___ my father's car.", answer: "by means of", japanese: "私は父の車でそこへ向かった。" },
            { example: "He made the machine ___ the plans.", answer: "in accordance with", japanese: "彼は設計図通りにその機械を作った。" },
            { example: "I must study French ___ English.", answer: "in addition to", japanese: "私は英語に加えてフランス語も勉強しなければならない。" },
            { example: "Fasten your seatbelt ___ accident.", answer: "in case of", japanese: "事故に備えてシートベルトを締めなさい。" },
            { example: "The incident happened right ___ me.", answer: "in front of", japanese: "その事件はまさに私の目の前で起きた。" },
            { example: "Jane will attend the party ___ him.", answer: "in lieu of", japanese: "彼の代わりにジェーンがそのパーティーに出席する。" },
            { example: "She has stood him ___ the daughter he lost.", answer: "in place of", japanese: "彼女はずっと、彼の亡くした娘の代わりになっている。" },
            { example: "___ culture, he is much superior.", answer: "in point of", japanese: "教養の点では彼の方がよっぽど優っている。" },
            { example: "___ bad weather, we went out for a drive.", answer: "in spite of", japanese: "悪天候にもかかわらず、私たちはドライブに出かけた。" },
            { example: "I had to take days off ___ illness.", answer: "on account of", japanese: "病気のため、私は休職せざるを得なかった。" },
            { example: "I'd like to say thank you ___ my son.", answer: "on behalf of", japanese: "息子に代わってお礼を申し上げたい。" },
            { example: "Judy gets a commission ___ her salary.", answer: "on top of", japanese: "ジュディは給料に加えて歩合ももらっている。" },
            { example: "She made inquiries ___ the product.", answer: "with regard to", japanese: "彼女はその製品について問い合わせた。" },
            { example: "We have no idea ___ the matter.", answer: "with respect to", japanese: "その件に関しては我々は何も分からない。" },
        ];

        let questions = []; // 全問題
        let incorrectQuestions = []; // 不正解だった問題
        let currentQuestionIndex = 0;
        let correctCount = 0;

        const englishSentenceDiv = document.getElementById('englishSentence');
        const japaneseSentenceDiv = document.getElementById('japaneseSentence');
        const answerInput = document.getElementById('answerInput');
        const checkButton = document.getElementById('checkButton');
        const message = document.getElementById('message');
        const nextButton = document.getElementById('nextButton');
        const progressBarFill = document.getElementById('progressBarFill');
        const questionCounter = document.getElementById('questionCounter');

        // 問題をシャッフルする関数
        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
        }

        // クイズを初期化する関数
        function initializeQuiz() {
            questions = [...quizData]; // 元のデータをコピー
            shuffleArray(questions);
            incorrectQuestions = [];
            currentQuestionIndex = 0;
            correctCount = 0;
            updateQuestionCounter();
            loadQuestion();
            updateProgressBar();
        }

        // 問題をロードする関数
        function loadQuestion() {
            if (currentQuestionIndex < questions.length) {
                const q = questions[currentQuestionIndex];
                const answerWords = q.answer.split(' '); // 正解の単語を分割
                let placeholders = '';
                // 正解の単語数だけアンダースコアのプレースホルダーを生成
                for (let i = 0; i < answerWords.length; i++) {
                    placeholders += `<span class="text-red-500 underline">___</span> `;
                }
                // 末尾のスペースを削除
                placeholders = placeholders.trim();

                // 英語の例文の最初の '___' を生成したプレースホルダーに置き換える
                const exampleText = q.example.replace('___', placeholders);
                englishSentenceDiv.innerHTML = exampleText;
                japaneseSentenceDiv.textContent = q.japanese; // 日本語訳を表示

                answerInput.value = '';
                message.textContent = '';
                message.className = 'message';
                checkButton.disabled = false;
                nextButton.disabled = true;
                nextButton.classList.add('bg-gray-400', 'cursor-not-allowed');
                nextButton.classList.remove('bg-blue-500', 'hover:bg-blue-600', 'cursor-pointer');
                answerInput.focus(); // 入力フィールドにフォーカス
            } else {
                // 全ての問題が終了した場合
                if (incorrectQuestions.length > 0) {
                    // 不正解の問題がある場合、それらを再挑戦問題としてシャッフルしてセット
                    questions = [...incorrectQuestions];
                    shuffleArray(questions);
                    incorrectQuestions = [];
                    currentQuestionIndex = 0;
                    // メッセージを表示して、次のラウンドへ
                    englishSentenceDiv.innerHTML = `<span class="text-xl text-blue-700">お疲れ様でした！</span>`;
                    japaneseSentenceDiv.innerHTML = `<span class="text-lg text-gray-700">不正解だった問題に再挑戦しましょう。</span>`;
                    answerInput.disabled = true;
                    checkButton.disabled = true;
                    nextButton.disabled = false; // 再挑戦ラウンド開始ボタンとして使う
                    nextButton.textContent = '再挑戦開始';
                    nextButton.classList.remove('bg-gray-400', 'cursor-not-allowed');
                    nextButton.classList.add('bg-blue-500', 'hover:bg-blue-600', 'cursor-pointer');
                } else {
                    // 全ての問題に正解した場合
                    englishSentenceDiv.innerHTML = `<span class="text-xl text-green-700">全問正解です！おめでとうございます！</span>`;
                    japaneseSentenceDiv.innerHTML = `<span class="text-lg text-gray-700">もう一度プレイしますか？</span>`;
                    answerInput.disabled = true;
                    checkButton.disabled = true;
                    nextButton.disabled = false;
                    nextButton.textContent = '最初からやり直す';
                    nextButton.classList.remove('bg-gray-400', 'cursor-not-allowed');
                    nextButton.classList.add('bg-blue-500', 'hover:bg-blue-600', 'cursor-pointer');
                }
                updateProgressBar();
            }
        }

        // 進捗バーを更新する関数
        function updateProgressBar() {
            const totalQuestions = quizData.length; // 元のデータの数で進捗を計算
            const progress = (correctCount / totalQuestions) * 100;
            progressBarFill.style.width = `${progress}%`;
        }

        // 問題数を更新する関数
        function updateQuestionCounter() {
            questionCounter.textContent = `正解数: ${correctCount} / ${quizData.length}`;
        }

        // 回答をチェックする関数
        function checkAnswer() {
            const userAnswer = answerInput.value.trim().toLowerCase();
            const currentQuestion = questions[currentQuestionIndex];
            const correctPreposition = currentQuestion.answer.toLowerCase();

            if (userAnswer === correctPreposition) {
                message.textContent = '正解！';
                message.className = 'message correct';
                correctCount++;
                updateQuestionCounter();
                updateProgressBar();
                checkButton.disabled = true;
                nextButton.disabled = false;
                nextButton.classList.remove('bg-gray-400', 'cursor-not-allowed');
                nextButton.classList.add('bg-blue-500', 'hover:bg-blue-600', 'cursor-pointer');
            } else {
                message.textContent = `不正解！ 正解は「${correctPreposition}」です。`;
                message.className = 'message incorrect';
                // 不正解だった問題を不正解リストに追加（重複しないように）
                if (!incorrectQuestions.includes(currentQuestion)) {
                    incorrectQuestions.push(currentQuestion);
                }
                // 不正解でも次の問題に進めるようにする（ただし同じ問題を繰り返せる）
                checkButton.disabled = true;
                nextButton.disabled = false;
                nextButton.classList.remove('bg-gray-400', 'cursor-not-allowed');
                nextButton.classList.add('bg-blue-500', 'hover:bg-blue-600', 'cursor-pointer');
            }
        }

        // イベントリスナー
        checkButton.addEventListener('click', checkAnswer);

        // Enterキーでチェック/次の問題に進む
        answerInput.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                if (!checkButton.disabled) {
                    checkAnswer();
                } else if (!nextButton.disabled) {
                    nextQuestion();
                }
            }
        });

        nextButton.addEventListener('click', nextQuestion);

        function nextQuestion() {
            // ボタンのテキストで次のアクションを判断
            if (nextButton.textContent === '再挑戦開始' || nextButton.textContent === '最初からやり直す') {
                initializeQuiz();
                answerInput.disabled = false;
                checkButton.disabled = false;
                nextButton.textContent = '次の問題';
                updateProgressBar();
                updateQuestionCounter();
            } else {
                currentQuestionIndex++;
                loadQuestion();
            }
        }

        // DOMContentLoaded イベントリスナーでクイズを初期化
        document.addEventListener('DOMContentLoaded', initializeQuiz);

    </script>
</body>
</html>
